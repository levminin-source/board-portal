<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MARSHALL · Совет директоров</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<!--
  MVP-фронтенд без этапа сборки: React подключается напрямую, JSX компилируется
  в браузере (Babel standalone). Это осознанный компромисс ради простоты запуска.
  При переносе в закрытый контур ДЦТиИТ переводит фронтенд на сборку Vite + TypeScript
  (см. README, раздел «Доработка для закрытого контура») и размещает библиотеки локально.
-->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body{margin:0;font-family:'PT Sans',sans-serif;background:#F5F6F8}
  button:hover:not(:disabled){filter:brightness(.94)}
  button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid #E4173F;outline-offset:2px}
  @media (max-width: 860px){ .calendar-layout{ grid-template-columns: 1fr !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
